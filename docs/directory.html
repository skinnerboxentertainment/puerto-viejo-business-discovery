<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puerto Viejo Business Directory</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root { --bg: #f5f6fa; --card: #fff; --text: #2c3e50; --muted: #7f8c8d; --border: #ecf0f1; --accent: #3498db; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
.header { background: linear-gradient(135deg, #2c3e50, #34495e); color: white; padding: 24px 20px 16px; }
.header h1 { font-size: 22px; margin-bottom: 4px; }
.header .sub { font-size: 13px; opacity: 0.7; }
.stats-bar { display: flex; gap: 16px; font-size: 12px; margin-top: 10px; color: rgba(255,255,255,0.85); }
.stats-bar span { }
.container { max-width: 1280px; margin: 0 auto; padding: 12px 16px; }

/* Filters */
.filters { background: var(--card); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.search-wrap { flex: 1; min-width: 180px; }
.search-wrap input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
.search-wrap input:focus { border-color: var(--accent); }
.filter-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--card); cursor: pointer; }
.pills { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; }
.pill { padding: 5px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--card); transition: all 0.15s; user-select: none; }
.pill:hover { border-color: var(--accent); }
.pill.active { background: var(--accent); color: white; border-color: var(--accent); }
.result-count { font-size: 13px; color: var(--muted); margin-bottom: 10px; }

/* Card grid */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-bottom: 16px; }
.card { background: var(--card); border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: box-shadow 0.2s; cursor: pointer; position: relative; }
.card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.12); }
.card.highlighted { box-shadow: 0 0 0 2px var(--accent); }
.card .name { font-weight: 600; font-size: 15px; margin-bottom: 2px; line-height: 1.3; }
.card .meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.card .meta span { margin-right: 8px; }
.card .field { font-size: 12px; margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
.card .field a { color: var(--accent); text-decoration: none; }
.card .field a:hover { text-decoration: underline; }
.card .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
.badge-ig { background: #e8f8f5; color: #1abc9c; }
.badge-ig-high { background: #d5f5e3; color: #27ae60; }
.badge-ig-low { background: #fef9e7; color: #f39c12; }
.badge-phone { background: #eaf2f8; color: #2980b9; }
.badge-web { background: #f4ecf7; color: #8e44ad; }
.card .cat-icon { display: inline-block; width: 28px; height: 28px; border-radius: 6px; text-align: center; line-height: 28px; font-size: 14px; margin-right: 6px; flex-shrink: 0; }
.card .top-row { display: flex; align-items: flex-start; gap: 8px; }
.card .top-row .name-area { flex: 1; min-width: 0; }
.card .view-map-btn { font-size: 11px; color: var(--accent); cursor: pointer; background: none; border: none; text-decoration: underline; padding: 0; margin-top: 4px; }
.card .view-map-btn:hover { color: #1a6da3; }

/* Map */
.map-toggle { display: block; width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); cursor: pointer; font-size: 13px; text-align: center; margin-bottom: 8px; }
.map-toggle:hover { background: #f8f9fa; }
#map { height: 0; border-radius: 8px; transition: height 0.3s; overflow: hidden; margin-bottom: 16px; }
#map.open { height: 400px; }
#map.mobile-open { height: 300px; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state p { margin-bottom: 12px; }
.empty-state button { padding: 8px 20px; border: none; border-radius: 6px; background: var(--accent); color: white; cursor: pointer; }

/* Mobile */
@media (max-width: 640px) {
  .card-grid { grid-template-columns: 1fr; }
  .filters { flex-direction: column; }
  .search-wrap { width: 100%; }
  .filter-select { width: 100%; }
}

/* Category colours */
.cat-hotel { background: #fdedec; color: #e74c3c; }
.cat-hostel { background: #fdebd0; color: #e67e22; }
.cat-vacation_rental { background: #fef9e7; color: #f1c40f; }
.cat-restaurant { background: #d5f5e3; color: #27ae60; }
.cat-shopping { background: #d6eaf8; color: #2980b9; }
.cat-services { background: #e8daef; color: #8e44ad; }
.cat-tour_company { background: #d1f2eb; color: #1abc9c; }
.cat-real_estate { background: #e5e8e8; color: #7f8c8d; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.card { animation: fadeIn 0.25s ease; }
</style>
</head>
<body>

<div class="header">
<h1>Puerto Viejo Business Directory</h1>
<div class="sub">450 businesses within 5 km &middot; Last updated 2026-07-04</div>
<div class="stats-bar">
<span id="statTotal">300</span> businesses
&middot; <span id="statIG">300</span> with verified Instagram
&middot; <span id="statWA">68</span> with WhatsApp
&middot; <span id="statPhone">280</span> with phone
</div>
</div>

<div class="container">

<div class="filters">
  <div class="search-wrap"><input type="text" id="searchInput" placeholder="Search business name..." autocomplete="off"></div>
  <select class="filter-select" id="areaFilter"><option value="">All areas</option></select>
  <select class="filter-select" id="igFilter">
    <option value="">Instagram: All</option>
    <option value="yes">Has Instagram</option>
    <option value="high">High confidence only</option>
    <option value="no">No Instagram</option>
  </select>
  <div class="pills" id="categoryPills">
    <span class="pill active" data-cat="">All</span>
  </div>
</div>

<div class="result-count" id="resultCount">Showing 450 of 450 businesses</div>

<div class="card-grid" id="cardGrid"></div>

<button class="map-toggle" id="mapToggle">&#128205; Show map</button>
<div id="map"></div>

<div class="empty-state" id="emptyState" style="display:none;">
  <p>No businesses match your filters.</p>
  <button onclick="resetFilters()">Reset filters</button>
</div>

</div>

<script>
// ---- Data ----
let businesses = [];
let map = null;
let markers = [];
let mapOpen = false;

fetch('businesses.json')
  .then(r => r.json())
  .then(data => {
    businesses = data;
    init();
  });

const CAT_COLORS = {
  hotel: '#e74c3c', hostel: '#e67e22', vacation_rental: '#f39c12',
  restaurant: '#2ecc71', shopping: '#3498db', services: '#9b59b6',
  tour_company: '#1abc9c', real_estate: '#34495e',
};
const CAT_ICONS = {
  hotel: '🏨', hostel: '🎒', vacation_rental: '🏠',
  restaurant: '🍽️', shopping: '🛍️', services: '🔧',
  tour_company: '🗺️', real_estate: '🏘️',
};
const CAT_LABELS = {
  hotel: 'Hotel', hostel: 'Hostel', vacation_rental: 'Vacation Rental',
  restaurant: 'Restaurant', shopping: 'Shopping', services: 'Services',
  tour_company: 'Tour', real_estate: 'Real Estate',
};

function init() {
  populateFilters();
  renderCards(businesses);
  initMap();
  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('areaFilter').addEventListener('change', applyFilters);
  document.getElementById('igFilter').addEventListener('change', applyFilters);
  document.getElementById('mapToggle').addEventListener('click', toggleMap);
}

function populateFilters() {
  // Areas
  const areas = [...new Set(businesses.map(b => b.area).filter(Boolean))].sort();
  const areaSel = document.getElementById('areaFilter');
  areas.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    areaSel.appendChild(opt);
  });

  // Category pills
  const cats = [...new Set(businesses.map(b => b.category).filter(Boolean))];
  const pills = document.getElementById('categoryPills');
  cats.sort().forEach(c => {
    const span = document.createElement('span');
    span.className = 'pill';
    span.dataset.cat = c;
    span.textContent = CAT_LABELS[c] || c;
    span.addEventListener('click', () => {
      document.querySelectorAll('#categoryPills .pill').forEach(p => p.classList.remove('active'));
      span.classList.add('active');
      applyFilters();
    });
    pills.appendChild(span);
  });
}

function applyFilters() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const area = document.getElementById('areaFilter').value;
  const ig = document.getElementById('igFilter').value;
  const cat = document.querySelector('#categoryPills .pill.active')?.dataset.cat || '';

  const filtered = businesses.filter(b => {
    if (query) {
      const name = (b.business_name || '').toLowerCase();
      if (!name.includes(query)) return false;
    }
    if (area && b.area !== area) return false;
    if (cat && b.category !== cat) return false;
    if (ig === 'yes' && !b.instagram_handle) return false;
    if (ig === 'high' && b.instagram_confidence !== 'high' && b.instagram_confidence !== 'confirmed') return false;
    if (ig === 'no' && b.instagram_handle) return false;
    return true;
  });

  renderCards(filtered);
  updateMarkers(filtered);
  document.getElementById('resultCount').textContent = `Showing ${filtered.length} of ${businesses.length} businesses`;
  document.getElementById('emptyState').style.display = filtered.length === 0 ? 'block' : 'none';
}

function renderCards(items) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = items.map(b => {
    const cat = b.category || 'unknown';
    const igHandle = b.instagram_handle || '';
    const igConf = b.instagram_confidence || '';
    const igBadge = igHandle
      ? (igConf === 'high' || igConf === 'confirmed')
        ? '<span class="badge badge-ig-high">High</span>'
        : igConf === 'low' ? '<span class="badge badge-ig-low">Low</span>' : '<span class="badge badge-ig">IG</span>'
      : '';
    const phone = b.normalized_phone || b.phone || '';
    const web = b.website || '';
    const phoneDisplay = phone ? phone.replace(/^\+/, '') : '';
    const dist = b.distance_km ? parseFloat(b.distance_km).toFixed(1) + ' km' : '';

    return `<div class="card" data-url="${b.url || ''}" onclick="focusMap(${b.latitude || 0}, ${b.longitude || 0}, this)">
      <div class="top-row">
        <div class="cat-icon cat-${cat}">${CAT_ICONS[cat] || '📌'}</div>
        <div class="name-area">
          <div class="name">${escHtml(b.business_name || '?')}</div>
          <div class="meta"><span>${CAT_LABELS[cat] || cat}</span> <span>📍 ${b.area || ''}</span> ${dist ? '<span>📏 ' + dist + '</span>' : ''}</div>
        </div>
      </div>
      ${igHandle ? `<div class="field">📷 <a href="${escHtml(b.instagram_url || '#')}" target="_blank">@${escHtml(igHandle)}</a> ${igBadge}</div>` : '<div class="field" style="color:#bdc3c7;">📷 No Instagram found</div>'}
      ${phone ? `<div class="field">📞 <a href="tel:${escHtml(phone)}">${escHtml(phoneDisplay)}</a> <span class="badge badge-phone">Phone</span></div>` : ''}
      ${b.whatsapp ? `<div class="field">💬 <a href="https://wa.me/${escHtml(b.whatsapp.replace(/[^0-9]/g,''))}" target="_blank">${escHtml(b.whatsapp)}</a> <span class="badge badge-ig">WhatsApp</span></div>` : ''}
      ${web ? `<div class="field">🌐 <a href="${escHtml(web)}" target="_blank">${escHtml(truncUrl(web))}</a> <span class="badge badge-web">Web</span></div>` : ''}
      <button class="view-map-btn" onclick="event.stopPropagation(); focusMap(${b.latitude || 0}, ${b.longitude || 0})">📍 View on map</button>
    </div>`;
  }).join('');
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function truncUrl(url) {
  try { const u = new URL(url); return u.hostname + (u.pathname.length > 20 ? u.pathname.slice(0,20)+'...' : u.pathname); }
  catch { return url.slice(0,40); }
}

// ---- Map ----
function initMap() {
  map = L.map('map').setView([9.6554, -82.7533], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>', maxZoom: 18,
  }).addTo(map);
  L.circle([9.6554, -82.7533], { radius: 5000, color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.05, weight: 2, dashArray: '5,10' }).addTo(map);
  L.marker([9.6554, -82.7533], {
    icon: L.divIcon({ className: '', html: '<div style="background:#e74c3c;color:white;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;">★</div>', iconSize: [16,16], iconAnchor: [8,8] })
  }).addTo(map).bindTooltip('Origin (5 km radius)', {direction:'top'});
  updateMarkers(businesses);
}

function updateMarkers(items) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  items.forEach(b => {
    const lat = parseFloat(b.latitude), lon = parseFloat(b.longitude);
    if (!lat || !lon) return;
    const cat = b.category || 'unknown';
    const color = CAT_COLORS[cat] || '#95a5a6';
    const m = L.circleMarker([lat, lon], { radius: 6, fillColor: color, color: '#fff', weight: 1.5, fillOpacity: 0.8 })
      .bindPopup(`<strong>${escHtml(b.business_name || '?')}</strong><br>${CAT_LABELS[cat] || cat} &middot; ${b.area || ''}${b.instagram_handle ? '<br>📷 @' + escHtml(b.instagram_handle) : ''}${b.normalized_phone || b.phone ? '<br>📞 ' + escHtml(b.normalized_phone || b.phone) : ''}`);
    markers.push(m);
    m.addTo(map);
  });
}

function focusMap(lat, lon, el) {
  if (!map) return;
  if (!mapOpen) { mapOpen = true; document.getElementById('map').classList.add('open'); document.getElementById('mapToggle').textContent = '📌 Hide map'; setTimeout(() => map.invalidateSize(), 350); }
  map.setView([lat, lon], 15, { animate: true });
  if (el) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
    el.classList.add('highlighted');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function toggleMap() {
  mapOpen = !mapOpen;
  const el = document.getElementById('map');
  const btn = document.getElementById('mapToggle');
  if (mapOpen) {
    el.classList.add('open');
    btn.textContent = '📌 Hide map';
    setTimeout(() => map.invalidateSize(), 350);
  } else {
    el.classList.remove('open');
    btn.textContent = '📌 Show map';
  }
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('areaFilter').value = '';
  document.getElementById('igFilter').value = '';
  document.querySelectorAll('#categoryPills .pill').forEach(p => p.classList.remove('active'));
  document.querySelector('#categoryPills .pill:first-child').classList.add('active');
  applyFilters();
}
</script>
</body>
</html>
